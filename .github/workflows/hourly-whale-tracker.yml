name: Hourly Whale Tracker

on:
  workflow_dispatch:

jobs:
  track-whales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python src/whales/tracker.py
