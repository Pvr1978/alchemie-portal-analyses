name: Daily On-Chain Metrics - Debug

on:
  workflow_dispatch:

jobs:
  onchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # caching voor pip packages (versnelt herhaalde runs)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir requests pandas python-dotenv ccxt

      - name: Debug file & folder structure
        run: |
          echo "Huidige werkdirectory:"
          pwd
          echo "\nLijst src/onchain:"
          ls -la src/onchain || echo "Map src/onchain bestaat NIET!"
          echo "\nCheck metrics.py:"
          ls -la src/onchain/metrics.py || echo "metrics.py NIET gevonden!"
          echo "\nPython versie & packages:"
          python --version
          pip list | grep -E "requests|pandas|ccxt|dotenv|python-dotenv"

      - name: Run metrics script with full logging
        run: |
          python src/onchain/metrics.py > metrics_output.log 2>&1
          EXIT_CODE=$?
          echo "Script exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Script faalde!"
          fi
          echo "\n=== Volledige output / errors ==="
          cat metrics_output.log || echo "Geen metrics_output.log aangemaakt"

      - name: Upload debug artifact (ook bij falen)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onchain-debug-logs
          path: metrics_output.log
          if-no-files-found: warn
