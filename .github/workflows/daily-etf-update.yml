name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-flows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nodejs-scripts/package-lock.json

      - name: Debug files
        run: |
          ls -la nodejs-scripts/
          cat nodejs-scripts/package.json || echo "Geen package.json"
          ls nodejs-scripts/package-lock.json && echo "Lock aanwezig" || echo "Geen lockfile"

      - name: Install dependencies (clean & force)
        working-directory: ./nodejs-scripts
        run: |
          npm cache clean --force || true
          rm -rf node_modules package-lock.json || true
          npm install --legacy-peer-deps --force
          npm list --depth=0 || echo "List faalt maar doorgaan"

      - name: Run script
        working-directory: ./nodejs-scripts
        run: |
          mkdir -p ../etf_flows
          echo "Start script..."
          node fetch-etf-flows.js > ../etf_flows/etf_flows_$(date +%Y-%m-%d).md 2>&1
          code=$?
          echo "Exit code: $code"
          echo "=== Laatste 50 regels ==="
          tail -n 50 ../etf_flows/etf_flows_$(date +%Y-%m-%d).md || echo "Geen file"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-report
          path: etf_flows/*.md
          if-no-files-found: warn

      - name: Commit changes
        run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet && echo "Geen wijzigingen" || git commit -m "ETF update $(date +'%Y-%m-%d')"
          git push || echo "Geen push"
