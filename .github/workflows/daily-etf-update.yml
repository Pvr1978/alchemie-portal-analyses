name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-flows:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node 24 om deprecation te omzeilen
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # Gebruik Node 24 direct

      - name: Debug directory & files
        run: |
          ls -la
          ls -la nodejs-scripts || echo "nodejs-scripts map ontbreekt!"
          ls -la etf_flows || echo "etf_flows map ontbreekt!"
          ls -la nodejs-scripts/package.json || echo "package.json niet gevonden!"

      - name: Install dependencies
        run: |
          cd nodejs-scripts || { echo "Fout: cd nodejs-scripts mislukt"; exit 1; }
          npm install axios cheerio --save --legacy-peer-deps --force || npm install --force
          npm list || echo "npm list faalt"

      - name: Run ETF script
        run: |
          cd nodejs-scripts
          node fetch-etf-flows.js > ../etf_flows/etf_debug_log_$(date +%Y-%m-%d).md 2>&1
          cat ../etf_flows/etf_debug_log_$(date +%Y-%m-%d).md

      - name: Commit changes
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git commit -m "Auto: ETF flows debug update $(date +'%Y-%m-%d')" || echo "Geen changes"
          git push || echo "Geen push nodig"
