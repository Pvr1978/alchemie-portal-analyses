name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-flows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'              # ← tijdelijk terug naar 20 (stabieler dan 24 voor veel libs)
          cache: 'npm'
          cache-dependency-path: nodejs-scripts/package-lock.json

      - name: Debug folder structure
        run: |
          pwd
          ls -la .
          echo "=== nodejs-scripts ==="
          ls -la nodejs-scripts || echo "Map nodejs-scripts ontbreekt!"
          echo "=== package.json inhoud ==="
          cat nodejs-scripts/package.json || echo "Geen package.json gevonden"

      - name: Install dependencies
        working-directory: ./nodejs-scripts
        run: |
          npm ci || npm install --legacy-peer-deps --force
          npm list --depth=0 || echo "npm list faalt"

      - name: Run ETF fetch script
        working-directory: ./nodejs-scripts
        run: |
          node fetch-etf-flows.js > ../etf_flows/etf_debug_log_$(date +%Y-%m-%d).md 2>&1 || echo "Script exited with code $?"
          echo "=== Debug log inhoud ==="
          cat ../etf_flows/etf_debug_log_$(date +%Y-%m-%d).md || echo "Log file niet aangemaakt"

      - name: Commit & push changes (alleen als er iets veranderd is)
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet || git commit -m "Auto: ETF flows update $(date +'%Y-%m-%d')"
          git push || echo "Geen push nodig of push mislukt"
