name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-flows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # caching blijft aan, maar zonder specifieke path

      - name: Debug folder & files
        run: |
          pwd
          ls -la .
          ls -la nodejs-scripts || echo "nodejs-scripts map ontbreekt!"
          ls -la nodejs-scripts/package.json || echo "Geen package.json"
          ls -la nodejs-scripts/package-lock.json || echo "Geen package-lock.json gevonden!"

      - name: Install dependencies
        working-directory: ./nodejs-scripts
        run: |
          npm ci || npm install --legacy-peer-deps --force
          npm list --depth=0

      - name: Run ETF fetch script
        working-directory: ./nodejs-scripts
        run: |
          mkdir -p ../etf_flows
          node fetch-etf-flows.js > ../etf_flows/etf_flows_$(date +%Y-%m-%d).md 2>&1 || echo "Script exited with code $?"
          echo "=== Debug log (laatste 30 regels) ==="
          tail -n 30 ../etf_flows/etf_flows_$(date +%Y-%m-%d).md || echo "Log niet aangemaakt"

      - name: Upload artifact (ook bij falen)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-flows-report
          path: etf_flows/etf_flows_*.md
          retention-days: 14

      - name: Commit & push changes
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet || git commit -m "Auto: ETF flows update $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Geen push nodig of push mislukt"
