name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'  # elke dag om 10:00 UTC
  workflow_dispatch:

jobs:
  update-flows:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # lost Node 20 deprecation warning op
    permissions:
      contents: write  # nodig voor git commit/push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # caching aan, geen specifieke path meer (lost lockfile error op)

      - name: Debug folder structure & files
        run: |
          pwd
          ls -la .
          echo "=== nodejs-scripts inhoud ==="
          ls -la nodejs-scripts || echo "Map nodejs-scripts ontbreekt!"
          echo "=== package.json inhoud ==="
          cat nodejs-scripts/package.json || echo "Geen package.json gevonden"
          echo "=== package-lock.json check ==="
          ls -la nodejs-scripts/package-lock.json || echo "Geen package-lock.json gevonden"

      - name: Install dependencies
        working-directory: ./nodejs-scripts
        run: |
          npm ci || npm install --legacy-peer-deps --force
          npm list --depth=0 || echo "npm list faalt"

      - name: Run ETF fetch script
        working-directory: ./nodejs-scripts
        run: |
          mkdir -p ../etf_flows
          node fetch-etf-flows.js > ../etf_flows/etf_flows_$(date +%Y-%m-%d).md 2>&1 || echo "Script exited with code $?"
          echo "=== Script output (laatste 30 regels) ==="
          tail -n 30 ../etf_flows/etf_flows_$(date +%Y-%m-%d).md || echo "Geen log file aangemaakt"

      - name: Upload artifact (ook als er geen files zijn)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-flows-report
          path: etf_flows/etf_flows_*.md
          if-no-files-found: warn  # waarschuw alleen, faal niet
          retention-days: 14

      - name: Commit & push changes (alleen als er wijzigingen zijn)
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet || git commit -m "Auto: ETF flows update $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Geen push nodig of push mislukt"
      - name: Run ETF fetch script
        working-directory: ./nodejs-scripts
        run: |
          mkdir -p ../etf_flows
          node fetch-etf-flows.js > ../etf_flows/etf_flows_$(date +%Y-%m-%d).md 2>&1 || echo "Script exited with code $?"
          echo "=== Debug log (laatste 30 regels) ==="
          tail -n 30 ../etf_flows/etf_flows_$(date +%Y-%m-%d).md || echo "Log niet aangemaakt"

      - name: Upload artifact (ook bij falen)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-flows-report
          path: etf_flows/etf_flows_*.md
          retention-days: 14

      - name: Commit & push changes
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet || git commit -m "Auto: ETF flows update $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Geen push nodig of push mislukt"
