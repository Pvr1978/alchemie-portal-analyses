name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-etf-flows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -d "nodejs-scripts" ]; then
            cd nodejs-scripts
            npm install || echo "npm install failed, trying npm ci"
            npm ci || npm install --force
          else
            echo "nodejs-scripts map niet gevonden!"
            exit 1
          fi

      - name: Run ETF flows script
        run: |
          cd nodejs-scripts || exit 1
          node fetch-etf-flows.js > ../etf_flows/etf_update_$(date +'%Y-%m-%d').md  # Maak nieuwe file per dag voor debug
          cat ../etf_flows/etf_update_$(date +'%Y-%m-%d').md  # Toon output in log

      - name: Commit changes
        run: |
          git config --global user.name "Alchemie Portal Bot"
          git config --global user.email "actions@github.com"
          git add etf_flows/
          git commit -m "Auto-update ETF flows $(date +'%Y-%m-%d')" || echo "No changes - pending data"
          git push || echo "Push skipped - no changes"
