name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'  # Elke dag 10:00 UTC (~11:00 NL) – pas aan als je wilt (bijv. '0 8 * * *' voor 08:00 UTC)
  workflow_dispatch:  # Handmatig starten via Actions tab

jobs:
  update-etf-flows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd nodejs-scripts
          npm ci  # Of npm install als je geen lockfile hebt

      - name: Run ETF flows script
        run: |
          cd nodejs-scripts
          node fetch-etf-flows.js >> ../etf_flows/bitcoin_etf_flows_latest.md  # Append naar deze file (maak hem aan als hij niet bestaat)

      - name: Commit updated flows
        run: |
          git config user.name "Alchemie Portal Bot"
          git config user.email "actions@github.com"
          git add etf_flows/
          git commit -m "Auto: Bitcoin ETF flows update $(date +'%Y-%m-%d')" || echo "Geen nieuwe data"
          git push
