name: Daily ETF Flows Auto-Update

on:
  schedule:
    - cron: '0 10 * * *'      # elke dag 10:00 UTC
  workflow_dispatch:

jobs:
  update-flows:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # nodig voor git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nodejs-scripts/package-lock.json

      - name: Debug folder & files
        run: |
          pwd
          ls -la .
          echo "=== nodejs-scripts map ==="
          ls -la nodejs-scripts || echo "Map nodejs-scripts ontbreekt!"
          echo "=== fetch-etf-flows.js check ==="
          ls -la nodejs-scripts/fetch-etf-flows.js || echo "fetch-etf-flows.js NIET GEVONDEN!"
          echo "=== package.json inhoud ==="
          cat nodejs-scripts/package.json || echo "Geen package.json"

      - name: Install dependencies
        working-directory: ./nodejs-scripts
        run: |
          npm ci || npm install --legacy-peer-deps --force
          npm list --depth=0

      - name: Run ETF flows script
        working-directory: ./nodejs-scripts
        run: |
          mkdir -p ../etf_flows
          node fetch-etf-flows.js > ../etf_flows/etf_flows_$(date +%Y-%m-%d).md 2>&1 || echo "Script exited with code $?"
          echo "=== Script output (laatste 30 regels) ==="
          tail -n 30 ../etf_flows/etf_flows_$(date +%Y-%m-%d).md

      - name: Upload artifact (altijd beschikbaar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-flows-report
          path: etf_flows/etf_flows_*.md
          retention-days: 14

      - name: Commit & push (alleen als er wijzigingen zijn)
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet || git commit -m "Auto: ETF flows update $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Geen push nodig of push mislukt"
      - name: Run ETF fetch script
        working-directory: ./nodejs-scripts
        run: |
          node fetch-etf-flows.js > ../etf_flows/etf_debug_log_$(date +%Y-%m-%d).md 2>&1 || echo "Script exited with code $?"
          echo "=== Debug log inhoud ==="
          cat ../etf_flows/etf_debug_log_$(date +%Y-%m-%d).md || echo "Log file niet aangemaakt"

      - name: Commit & push changes (alleen als er iets veranderd is)
        run: |
          git config user.name "Alchemie Bot"
          git config user.email "bot@github.com"
          git add etf_flows/
          git diff --staged --quiet || git commit -m "Auto: ETF flows update $(date +'%Y-%m-%d')"
          git push || echo "Geen push nodig of push mislukt"
