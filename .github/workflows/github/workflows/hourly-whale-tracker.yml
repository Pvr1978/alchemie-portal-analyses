name: Hourly Whale Tracker

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  track-whales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run whale tracker
        run: |
          python src/whales/tracker.py
        env:
          GLASSNODE_API_KEY: ${{ secrets.GLASSNODE_API_KEY }}
          NANSEN_API_KEY: ${{ secrets.NANSEN_API_KEY }}
