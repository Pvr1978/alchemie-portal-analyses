name: Daily Macro Report

on:
  schedule:
    - cron: '0 7 * * *'   # elke dag om 7:00 UTC
  workflow_dispatch:       # handmatig triggerbaar

jobs:
  macro:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # om rapport te kunnen pushen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas python-dotenv

      - name: Run macro report script
        run: |
          python src/macro/macro_report.py

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add macro/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update macro report $(date +'%Y-%m-%d')"
          git push
