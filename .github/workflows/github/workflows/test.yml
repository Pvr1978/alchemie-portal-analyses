import requests
import time

def fetch_btc_price(retries=3):
    url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd"
    headers = {"User-Agent": "AlchemiePortal-Test/1.0 (github.com/yourusername)"}

    for attempt in range(retries):
        try:
            r = requests.get(url, headers=headers, timeout=10)
            r.raise_for_status()  # gooit exception bij 4xx/5xx
            data = r.json()
            btc_price = data["bitcoin"]["usd"]
            print(f"BTC: ${btc_price:,.0f}")
            return btc_price
        except requests.exceptions.RequestException as e:
            print(f"Attempt {attempt+1}/{retries} failed: {e}")
            if attempt < retries - 1:
                time.sleep(2 ** attempt)  # exponential backoff: 1s → 2s → 4s
        except (KeyError, ValueError) as e:
            print(f"Parsing error: {e}")
            break
    print("Failed to fetch BTC price after retries.")
    return None

if __name__ == "__main__":
    fetch_btc_price()
